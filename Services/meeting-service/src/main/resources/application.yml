server:
  port: 8082

spring:
  application:
    name: meeting-service

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5435/meeting_db
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Redis
  data:
    redis:
      host: localhost
      port: 6379

  # Kafka
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  # OAuth2 Resource Server
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/visioconference-realm
          jwk-set-uri: http://localhost:8180/realms/visioconference-realm/protocol/openid-connect/certs

# Auth Service URL
auth-service:
  url: http://localhost:8081

logging:
  level:
    org.springframework.security: INFO
    org.springframework.kafka: INFO
    com.visio.meeting: DEBUG